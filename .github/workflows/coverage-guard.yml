name: Coverage Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  placeholder:
    name: Coverage Gate Placeholder
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enforce future coverage integration point
        shell: bash
        run: |
          if find . -type f \( -name 'package.json' -o -name 'pyproject.toml' -o -name 'setup.py' -o -name '*.csproj' -o -name 'pom.xml' -o -name 'build.gradle' -o -name 'Cargo.toml' \) | grep -q .; then
            echo "Application manifests detected. Replace .github/workflows/coverage-guard.yml with a language-specific test and coverage workflow."
            exit 1
          fi
          echo "No application manifests detected yet; placeholder gate passed."
